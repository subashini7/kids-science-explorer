name: Refresh Science News

on:
  schedule:
    - cron: '0 13 * * *'  # every day at 6 AM PT (UTC-7 PDT)
  workflow_dispatch:        # allow manual "Run workflow" button in GitHub UI

permissions:
  contents: write           # needed to commit news.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch & categorise news
        run: python scripts/fetch_news.py

      - name: Commit updated news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: refresh science news [$(date -u +%Y-%m-%d)]"
          git push
